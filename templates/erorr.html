{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="all-title-box">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <h2>Error page</h2>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#">Home</a></li>
                        <li class="breadcrumb-item active">ABOUT US</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <!-- End All Title Box -->
<div class="container p-5 mb-4 mt-4 text-center w-50 border border-2">
 {% if messages %}
<ul class="messages">
 {% for message in messages %}
   <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
     {{ message }}
   </li>
 {% endfor %}
</ul>
{% endif %}

</div>
{% endblock %}
